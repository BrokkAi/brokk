version: '3.8'

services:
  slopscan:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SLOP_V_RATIO=1.0
      - SLOP_I_DRIFT=0.1
      - SLOP_E_IGNORE=50
      - SLOP_C_DAY=1200
      - SLOP_M_MULTIPLIER=1.5
      - SLOP_N_TEAM=6
      - BROKK_API_KEY=${BROKK_API_KEY:-}
    volumes:
      - ../app:/app/app

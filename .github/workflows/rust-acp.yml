name: Rust ACP CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths:
      - 'brokk-acp-rust/**'
      - '.github/workflows/rust-acp.yml'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'brokk-acp-rust/**'
      - '.github/workflows/rust-acp.yml'

jobs:
  rust-acp:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        # `brokk-acp-rust/build.rs` cross-compiles the `brokk-acp-sandbox`
        # crate to `wasm32-wasip2` and embeds the resulting `.wasm` bytes
        # via `include_bytes!`, so the runner must have the target's
        # std-aware sysroot available before `cargo build`.
        targets: wasm32-wasip2

    - name: Install bubblewrap (Linux sandbox runtime)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y bubblewrap

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          brokk-acp-rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('brokk-acp-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Rust formatting
      working-directory: brokk-acp-rust
      run: cargo fmt --check

    - name: Run Clippy lints
      working-directory: brokk-acp-rust
      run: cargo clippy --all-targets -- -D warnings

    - name: Build Rust ACP server
      working-directory: brokk-acp-rust
      run: cargo build --release

    - name: Run Rust ACP tests
      working-directory: brokk-acp-rust
      run: cargo test

name: Foreman CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths:
      - 'brokk-foreman/**'
      - '.github/workflows/foreman.yml'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'brokk-foreman/**'
      - '.github/workflows/foreman.yml'

jobs:
  foreman:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install Tauri 2 system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          brokk-foreman/target
        key: ${{ runner.os }}-foreman-cargo-${{ hashFiles('brokk-foreman/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-foreman-cargo-

    - name: Check Rust formatting
      working-directory: brokk-foreman
      run: cargo fmt --all -- --check

    - name: Run Clippy lints
      working-directory: brokk-foreman
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Build foreman workspace
      working-directory: brokk-foreman
      run: cargo build --workspace --all-targets

    - name: Run foreman tests
      working-directory: brokk-foreman
      run: cargo test --workspace

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Enable corepack
      run: |
        corepack enable
        corepack prepare pnpm@9.15.0 --activate

    - name: Install frontend dependencies
      working-directory: brokk-foreman
      run: pnpm install --frozen-lockfile

    - name: Type-check frontend
      working-directory: brokk-foreman
      run: pnpm check

    - name: Build frontend
      working-directory: brokk-foreman
      run: pnpm build

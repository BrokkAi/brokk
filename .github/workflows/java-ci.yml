name: Java CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths-ignore:
      - 'brokk-code/**'
      - 'brokk-acp-rust/**'
      - '.github/workflows/brokk-code-ci.yml'
      - '.github/workflows/rust-acp.yml'
  pull_request:
    branches: [ 'master' ]
    paths-ignore:
      - 'brokk-code/**'
      - 'brokk-acp-rust/**'
      - '.github/workflows/brokk-code-ci.yml'
      - '.github/workflows/rust-acp.yml'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21 (JetBrains Runtime)
      uses: actions/setup-java@v4
      with:
        distribution: jetbrains
        java-package: jdk+jcef
        java-version: '21'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Check commit
      run: git rev-parse HEAD

    - name: Run tests with full static analysis (Windows)
      if: matrix.os == 'windows-latest'
      run: ./gradlew check -PexcludeGitRepoTest

    - name: Run tests with full static analysis (Unix)
      if: matrix.os != 'windows-latest'
      run: ./gradlew check shadowJar

  formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code formatting
        run: ./gradlew spotlessCheck

  dependency-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run dependency analysis
        run: ./gradlew buildHealth

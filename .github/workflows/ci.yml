name: CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
  pull_request:
    branches: [ 'master' ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JBR 21
      uses: jansorg/github-actions-jbr-setup/setup_jbr21@main

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Check commit
      run: git rev-parse HEAD

    - name: Run tests with full static analysis (Windows)
      if: matrix.os == 'windows-latest'
      run: ./gradlew check -PexcludeGitRepoTest

    - name: Run tests with full static analysis (Unix)
      if: matrix.os != 'windows-latest'
      run: ./gradlew check shadowJar

  formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code formatting
        run: ./gradlew spotlessCheck

  dependency-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run dependency analysis
        run: ./gradlew buildHealth

  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brokk-code
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest>=8.0.0 ruff>=0.3.0
      - name: Run ruff linting
        run: ruff check .
      - name: Check ruff formatting
        run: ruff format --check .
      - name: Run tests
        run: pytest

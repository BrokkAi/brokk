name: CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
  pull_request:
    branches: [ 'master' ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21 (JetBrains Runtime)
      uses: actions/setup-java@v4
      with:
        distribution: jetbrains
        java-package: jdk+jcef
        java-version: '21'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Check commit
      run: git rev-parse HEAD

    - name: Run tests with full static analysis (Windows)
      if: matrix.os == 'windows-latest'
      run: ./gradlew check -PexcludeGitRepoTest

    - name: Run tests with full static analysis (Unix)
      if: matrix.os != 'windows-latest'
      run: ./gradlew check shadowJar

  formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code formatting
        run: ./gradlew spotlessCheck

  rust-acp:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install bubblewrap (Linux sandbox runtime)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y bubblewrap

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          brokk-acp-rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('brokk-acp-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build Rust ACP server
      working-directory: brokk-acp-rust
      run: cargo build --release

    - name: Run Rust ACP tests
      working-directory: brokk-acp-rust
      run: cargo test

    - name: Check Rust formatting
      working-directory: brokk-acp-rust
      run: cargo fmt --check

    - name: Run Clippy lints
      working-directory: brokk-acp-rust
      run: cargo clippy --all-targets -- -D warnings

  dependency-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run dependency analysis
        run: ./gradlew buildHealth

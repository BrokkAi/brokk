name: Brokk Code CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths:
      - 'brokk-code/**'
      - '.github/workflows/brokk-code-ci.yml'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'brokk-code/**'
      - '.github/workflows/brokk-code-ci.yml'

jobs:
  test:
    name: Lint and test brokk-code (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: brokk-code
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: brokk-code
        run: uv run ruff check

      - name: Ruff format check
        working-directory: brokk-code
        run: uv run ruff format --check

      - name: Pytest
        working-directory: brokk-code
        run: uv run pytest -q -n auto --no-header

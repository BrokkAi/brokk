name: Brokk Code CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths:
      - 'brokk-code/**'
      - '.github/workflows/brokk-code-ci.yml'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'brokk-code/**'
      - '.github/workflows/brokk-code-ci.yml'

jobs:
  test:
    name: Lint and test brokk-code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: brokk-code
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: brokk-code
        run: uv run ruff check

      - name: Ruff format check
        working-directory: brokk-code
        run: uv run ruff format --check

      - name: Pytest
        working-directory: brokk-code
        run: uv run pytest -q -n auto

name: brokk-tui CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
    paths:
      - 'brokk-tui-rust/**'
      - '.github/workflows/brokk-tui-ci.yml'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'brokk-tui-rust/**'
      - '.github/workflows/brokk-tui-ci.yml'

jobs:
  brokk-tui:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          brokk-tui-rust/target
        key: ${{ runner.os }}-brokk-tui-cargo-${{ hashFiles('brokk-tui-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-brokk-tui-cargo-

    - name: Check Rust formatting
      working-directory: brokk-tui-rust
      run: cargo fmt --check

    - name: Run Clippy lints
      working-directory: brokk-tui-rust
      run: cargo clippy --all-targets -- -D warnings

    - name: Build brokk-tui
      working-directory: brokk-tui-rust
      run: cargo build --release

    - name: Run tests
      working-directory: brokk-tui-rust
      run: cargo test

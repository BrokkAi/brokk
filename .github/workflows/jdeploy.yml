# This workflow will build a Java project with Gradle and bundle them as native app installers with jDeploy
# See https://www.jdeploy.com for more information.

name: jDeploy CI with Gradle

on:
  push:
    branches: [ 'master-snapshot', 'jdeploy-test' ]
  workflow_dispatch:

concurrency:
  group: jdeploy-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (JetBrains Runtime)
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-package: jdk+jcef
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get version from git
        id: version
        run: |
          VERSION=$(git describe --tags --exact-match HEAD 2>/dev/null || git describe --tags --always --dirty=-SNAPSHOT)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Download jdeploy-prelaunch.jar
        run: |
          PRELAUNCH_VERSION=$(jq -r '.jdeployPrelaunchVersion' package.json)
          mkdir -p app/build/libs
          curl -L "https://github.com/shannah/brokk-jdeploy-prelaunch/releases/download/${PRELAUNCH_VERSION}/jdeploy-prelaunch.jar" \
            -o app/build/libs/jdeploy-prelaunch.jar
          echo "Downloaded jdeploy-prelaunch.jar version ${PRELAUNCH_VERSION}"

      - name: Get JAR filename
        id: jar
        run: |
          JAR_FILE=$(find app/build/libs -name "brokk-*.jar" | head -1)
          JAR_NAME=$(basename "$JAR_FILE")
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR_NAME"

      - name: Update package.json with JAR name
        run: |
          jq '.jdeploy.jar = "${{ steps.jar.outputs.jar_file }}"' package.json > package.tmp.json && mv package.tmp.json package.json

      - name: Install DigiCert smtools
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
        run: |
          if [ -z "$SM_API_KEY" ]; then
            echo "SM_API_KEY not configured, skipping smtools install"
            exit 0
          fi
          curl -L --fail --show-error \
            -o smtools.tar.gz \
            https://pki-downloads.digicert.com/stm/latest/smtools-linux-x64.tar.gz
          tar -xzf smtools.tar.gz
          sudo mkdir -p /opt/digicert
          sudo cp -r smtools-linux-x64/* /opt/digicert/
          sudo chmod -R +x /opt/digicert/
          echo "/opt/digicert" >> $GITHUB_PATH
          echo "DigiCert smtools installed to /opt/digicert"

      - name: Configure DigiCert KeyLocker
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
        run: |
          if [ -z "$SM_API_KEY" ]; then
            echo "SM_API_KEY not configured, skipping DigiCert configuration"
            exit 0
          fi
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 -d > /tmp/digicert-client-cert.p12
          cat > /tmp/digicert-pkcs11.cfg <<'CFGEOF'
          name = DigiCertKeyLocker
          library = /opt/digicert/smpkcs11.so
          slotListIndex = 0
          CFGEOF
          echo "DigiCert KeyLocker PKCS#11 configured"

      - name: Sync DigiCert KeyLocker certificates
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: /tmp/digicert-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_HOST: ${{ vars.SM_HOST }}
        run: |
          if [ -z "$SM_API_KEY" ]; then
            echo "SM_API_KEY not configured, skipping certificate sync"
            exit 0
          fi
          smctl keypair ls
          echo "Certificate sync complete"

      - name: Build App Installer Bundles
        uses: shannah/jdeploy@master
        with:
          github_token: ${{ secrets.BROKK_RELEASES_TOKEN }}
          target_repository: 'BrokkAi/brokk-releases'
          win_signing_keystore_type: PKCS11
          win_signing_pkcs11_config: /tmp/digicert-pkcs11.cfg
          win_signing_password: ${{ secrets.SM_API_KEY }}
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: /tmp/digicert-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_HOST: ${{ vars.SM_HOST }}

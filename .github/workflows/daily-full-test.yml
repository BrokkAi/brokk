name: Daily Full Test Suite

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  full-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JBR 21
      uses: jansorg/github-actions-jbr-setup/setup_jbr21@main

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Check commit
      run: git rev-parse HEAD

    - name: Run full test suite with static analysis (Windows)
      if: matrix.os == 'windows-latest'
      run: .\gradlew.bat check

    - name: Run full test suite with static analysis (Unix)
      if: matrix.os != 'windows-latest'
      run: ./gradlew check

    - name: Build assembly (Windows)
      if: matrix.os == 'windows-latest'
      run: .\gradlew.bat shadowJar

    - name: Build assembly (Unix)
      if: matrix.os != 'windows-latest'
      run: ./gradlew shadowJar
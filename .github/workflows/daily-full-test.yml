name: Daily Full Test Suite

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  full-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21 (JetBrains Runtime)
      uses: actions/setup-java@v4
      with:
        distribution: jetbrains
        java-package: jdk+jcef
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Check commit
      run: git rev-parse HEAD

    - name: Run full test suite with static analysis and integration tests
      run: ./gradlew check intTest

    - name: Build assembly
      run: ./gradlew shadowJar

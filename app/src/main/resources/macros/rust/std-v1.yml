version: "1"
language: "rust"
macros:
  - name: "lazy_static"
    strategy: "BYPASS"
    options: {}
  - name: "Serialize"
    strategy: "BYPASS"
    options: {}
  - name: "Deserialize"
    strategy: "BYPASS"
    options: {}
  - name: "my_macro"
    strategy: "TEMPLATE"
    options:
      template: "pub struct {{name}} { {{#fields}}{{name}}: {{type}}, {{/fields}} }"
